  <style>
    :root {
      --white: #ffffff;
      --soft-white: #fffafb;
      --baby-pink: #f4d9e2;
      --baby-pink-2: #f9eef2;
      --dusty-pink: #d3a3b2;
      --dark-brown: #4e342e;
      --dark-brown-soft: #6e5049;
      --shadow-soft: 0 16px 42px rgba(110, 80, 73, 0.12);
      --shadow-card: 0 20px 40px rgba(120, 87, 80, 0.11);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--white); }
    body {
      margin: 0;
      background: var(--white);
      color: #2b2b2b;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    img, video, iframe { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    .screen {
      position: relative;
      width: 100%;
      min-height: 100svh;
      overflow: hidden;
      background: var(--soft-white);
    }

    #intro {
      isolation: isolate;
      cursor: pointer;
    }

    .intro-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to bottom, rgba(255,255,255,0.16), rgba(255,255,255,0.18)),
        url('https://raw.githubusercontent.com/maryam-FOLDS/Devendra-Roma/refs/heads/main/imagedev.png');
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 1s ease, transform 1.2s ease;
      z-index: 0;
    }

    #intro.reveal-bg .intro-bg {
      opacity: 1;
      transform: scale(1);
    }

    .hearts-wrap {
      position: absolute;
      left: 50%;
      top: 62%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 2;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #intro.reveal-bg .hearts-wrap {
      opacity: 0;
      transform: translateX(-50%) translateY(16px);
      pointer-events: none;
    }

    .heart {
      position: relative;
      transform: rotate(-45deg);
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.10);
      animation: floatHeart 2.3s ease-in-out infinite;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
    }

    .heart::before { top: -50%; left: 0; }
    .heart::after { left: 50%; top: 0; }

    .heart.small {
      width: 34px;
      height: 34px;
      background: #c98c9b;
      animation-delay: -0.25s;
    }

    .heart.large {
      width: 46px;
      height: 46px;
      background: #efc8d2;
    }

    @keyframes floatHeart {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -8px; }
    }

    .intro-overlay {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 28px 20px 36px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #intro.reveal-bg .intro-overlay { opacity: 1; }

    .hero-copy {
      width: min(92vw, 960px);
      min-height: calc(100svh - 64px);

      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.22);
      padding-top: 8svh;
      padding-bottom: 10svh;

      letter-spacing: 0.16em;

    .hero-names {
      font-family: 'Allura', cursive;

      line-height: 0.96;
      margin: 0;

    .hero-footer {

      background: rgba(255,255,255,0.10);
      box-shadow: 0 8px 26px rgba(0,0,0,0.10);
      transition: transform 0.25s ease, background 0.25s ease;
    }

      transform: translateY(-2px);
      background: rgba(255,255,255,0.16);
    }

    body.opened main { display: block; }

    .video-copy {

    .scratch-card::before {

    .countdown-section.countdown-locked {
      display: none;

    .countdown-section.countdown-visible {
      display: block;
      animation: fadeCountdownIn 0.65s ease;
    }

    @keyframes fadeCountdownIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }

    .countdown-shell {

      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;

    .countdown-title {

      justify-content: center;

    .countdown-pill {
      flex: 1 1 0;

      border-radius: 999px;
      background: linear-gradient(180deg, rgba(244,217,226,0.9), rgba(255,255,255,0.98));

      box-shadow: 0 18px 32px rgba(110, 80, 73, 0.10);

      flex-direction: column;
      align-items: center;
      justify-content: center;

    .countdown-value {
      color: var(--dark-brown);

      line-height: 1.4;

    .countdown-footer {
      margin: 0;
      color: var(--dark-brown-soft);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);

      background-repeat: no-repeat;
      background-size: cover;
      background-position: center center;

    .celebrate-sticky::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.08);
      z-index: 0;
    }

    .celebrate-glass {
      position: relative;
      width: min(96vw, 1320px);
      height: min(46svh, 400px);
      border-radius: 34px;
      overflow: hidden;
      z-index: 2;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.44);
      box-shadow: 0 18px 40px rgba(73, 48, 43, 0.10), inset 0 0 0 1px rgba(255,255,255,0.12);
    }

    .celebrate-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;

    .celebrate-glass::after {
      content: '';
      position: absolute;
      inset: 12px;

    .celebrate-copy {

      align-items: center;
      justify-content: center;

    .celebrate-title {
      margin: 0;

      50% { transform: translateY(34px); }
    }

    .oval::after {
      content: &quot;&quot;;
      position: absolute;
      inset: auto 12% 4% 12%;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(120,90,68,0.16) 0%, rgba(120,90,68,0) 72%);
      filter: blur(8px);
      pointer-events: none;
    }

    .oval img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: transform 0.8s ease;
    }

    .oval.visible img {
      transform: scale(1.04);
    }

    .meet-slider {
      position: relative;
      width: min(640px, 100%);
      margin: 34px auto 0;
      aspect-ratio: 0.8;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      animation: fadeSwap 8s infinite;
    }

    .slide:nth-child(2) { animation-delay: 4s; }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: portraitZoom 8s ease-in-out infinite;
    }

    @keyframes fadeSwap {
      0%, 10% { opacity: 0; }
      18%, 42% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes portraitZoom {
      0%, 100% { transform: scale(1.02); }
      50% { transform: scale(1.07); }

const observer = new IntersectionObserver((entries) =&gt; {
      entries.forEach((entry) =&gt; {
        if (entry.isIntersecting) entry.target.classList.add(&#x27;visible&#x27;);
      });
    }, { threshold: 0.14 });

    document.querySelectorAll(&#x27;.reveal&#x27;).forEach((el) =&gt; observer.observe(el));

    function makeSparkles(containerId, count) {
      const root = document.getElementById(containerId);
      if (!root) return;
      for (let i = 0; i &lt; count; i++) {
        const s = document.createElement(&#x27;span&#x27;);
        s.className = &#x27;sparkle&#x27;;
        s.style.left = Math.random() * 100 + &#x27;%&#x27;;
        s.style.top = Math.random() * 100 + &#x27;%&#x27;;
        s.style.setProperty(&#x27;--dur&#x27;, (3.8 + Math.random() * 4.8) + &#x27;s&#x27;);
        s.style.setProperty(&#x27;--delay&#x27;, (Math.random() * 4.6) + &#x27;s&#x27;);
        const size = 3 + Math.random() * 5;
        s.style.width = size + &#x27;px&#x27;;
        s.style.height = size + &#x27;px&#x27;;
        root.appendChild(s);
      }
    }

    makeSparkles(&#x27;heroSparkles&#x27;, 34);

  <script>
    const intro = document.getElementById('intro');
    const invitation = document.getElementById('invitation');
    const bgSong = document.getElementById('bgSong');
    let audioStarted = false;

    function startSong() {
      if (!bgSong || audioStarted) return;
      bgSong.volume = 0.55;
      const playPromise = bgSong.play();
      if (playPromise && typeof playPromise.then === 'function') {
        playPromise.then(() => {
          audioStarted = true;
        }).catch(() => {
          audioStarted = false;
        });
      }
    }

    function stopSong() {
      if (!bgSong) return;
      bgSong.pause();
      audioStarted = false;
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        intro.classList.add('reveal-bg');
      }, 2000);
    });

    intro.addEventListener('click', () => {
      startSong();
      document.body.classList.add('opened');
      invitation.style.display = 'block';
      requestAnimationFrame(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    function initScratchCard(canvas) {
      const card = canvas.parentElement;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });

      function roundRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
      }

      function drawSparkle(x, y, size) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.PI / 4);
        ctx.fillRect(-1, -size / 2, 2, size);
        ctx.fillRect(-size / 2, -1, size, 2);
        ctx.restore();
      }

      function paintLayer() {
        const rect = card.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);

        const grad = ctx.createLinearGradient(0, 0, rect.width, rect.height);
        grad.addColorStop(0, '#f8e2c4');
        grad.addColorStop(0.5, '#f2d0d8');
        grad.addColorStop(1, '#d9b36d');
        ctx.fillStyle = grad;
        roundRect(0, 0, rect.width, rect.height, rect.width / 2);
        ctx.fill();

        const shine = ctx.createLinearGradient(0, 0, rect.width, rect.height);
        shine.addColorStop(0, 'rgba(255,255,255,0.78)');
        shine.addColorStop(0.22, 'rgba(255,255,255,0.08)');
        shine.addColorStop(1, 'rgba(255,255,255,0.42)');
        ctx.fillStyle = shine;
        roundRect(0, 0, rect.width, rect.height, rect.width / 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        for (let i = 0; i < 7; i++) {
          const x = (rect.width * (0.18 + (i * 0.1))) % rect.width;
          const y = 18 + (i % 3) * 26;
          drawSparkle(x, y, 7 + (i % 2) * 2);
        }
      }

      function scratchAt(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, Math.max(14, rect.width * 0.11), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        checkReveal();
      }

      function checkReveal() {
        const rect = canvas.getBoundingClientRect();
        const sample = ctx.getImageData(0, 0, rect.width, rect.height).data;
        let transparent = 0;
        for (let i = 3; i < sample.length; i += 4) {
          if (sample[i] === 0) transparent++;
        }
        const percent = transparent / (sample.length / 4);
        if (percent > 0.42) {
          canvas.style.transition = 'opacity 0.45s ease';
          canvas.style.opacity = '0';
          canvas.style.pointerEvents = 'none';
        }
      }

      let scratching = false;
      canvas.addEventListener('pointerdown', (e) => { scratching = true; scratchAt(e.clientX, e.clientY); });
      canvas.addEventListener('pointermove', (e) => { if (scratching) scratchAt(e.clientX, e.clientY); });
      ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
        canvas.addEventListener(evt, () => { scratching = false; });
      });

      window.addEventListener('resize', paintLayer);
      paintLayer();
    }

    document.querySelectorAll('.scratch-canvas').forEach(initScratchCard);

    const part2Frame = document.getElementById('part2Frame');
    function resizePart2Frame() {
      if (!part2Frame) return;
      try {
        const doc = part2Frame.contentDocument || part2Frame.contentWindow.document;
        if (!doc) return;
        const body = doc.body;
        const htmlEl = doc.documentElement;
        const height = Math.max(
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0,
          htmlEl ? htmlEl.clientHeight : 0,
          htmlEl ? htmlEl.scrollHeight : 0,
          htmlEl ? htmlEl.offsetHeight : 0
        );
        if (height) part2Frame.style.height = height + 'px';
      } catch (e) {
        // ignore resize issues
      }
    }

    if (part2Frame) {
      part2Frame.addEventListener('load', () => {
        resizePart2Frame();
        setTimeout(resizePart2Frame, 400);
        setTimeout(resizePart2Frame, 1200);
      });
      window.addEventListener('resize', resizePart2Frame);
    }


    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopSong();
    });

    window.addEventListener('pagehide', stopSong);
    window.addEventListener('beforeunload', stopSong);

  </script>
